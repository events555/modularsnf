name: Publish

on:
    push:
        branches: [main, dev]

jobs:
    build-wheels:
        name: Build Wheels (${{ matrix.name }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: linux-x86_64
                      os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      manylinux: auto
                      interpreter: -i python3.10
                    - name: linux-aarch64
                      os: ubuntu-24.04-arm
                      target: aarch64-unknown-linux-gnu
                      manylinux: auto
                      interpreter: -i python3.10
                    - name: macos-x86_64
                      os: macos-15-intel
                      target: x86_64-apple-darwin
                      manylinux: ""
                      interpreter: ""
                    - name: macos-aarch64
                      os: macos-latest
                      target: aarch64-apple-darwin
                      manylinux: ""
                      interpreter: ""
                    - name: windows-x86_64
                      os: windows-latest
                      target: x86_64-pc-windows-msvc
                      manylinux: ""
                      interpreter: ""
                    - name: windows-aarch64
                      os: windows-11-arm
                      target: aarch64-pc-windows-msvc
                      manylinux: ""
                      interpreter: ""
        steps:
            - uses: actions/checkout@v5
            - uses: PyO3/maturin-action@v1
              with:
                  target: ${{ matrix.target }}
                  manylinux: ${{ matrix.manylinux }}
                  args: --release --out dist ${{ matrix.interpreter }}
            - uses: actions/upload-artifact@v5
              with:
                  name: wheels-${{ matrix.name }}
                  path: dist

    build-sdist:
        name: Build Source Distribution
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v5
            - uses: PyO3/maturin-action@v1
              with:
                  command: sdist
                  args: --out dist
            - uses: actions/upload-artifact@v5
              with:
                  name: sdist
                  path: dist

    check-dist:
        name: Check Distributions
        needs: [build-wheels, build-sdist]
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
            - name: Install twine
              run: python -m pip install twine
            - uses: actions/download-artifact@v5
              with:
                  path: dist
                  pattern: wheels-*
                  merge-multiple: true
            - uses: actions/download-artifact@v5
              with:
                  name: sdist
                  path: dist
            - name: Check distributions
              run: twine check dist/*

    publish-testpypi:
        name: Publish To TestPyPI
        needs: check-dist
        if: github.ref == 'refs/heads/dev'
        runs-on: ubuntu-24.04
        environment: testpypi
        permissions:
            id-token: write
        steps:
            - uses: actions/download-artifact@v5
              with:
                  path: dist
                  pattern: wheels-*
                  merge-multiple: true
            - uses: actions/download-artifact@v5
              with:
                  name: sdist
                  path: dist
            - uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  repository-url: https://test.pypi.org/legacy/

    publish-pypi:
        name: Publish To PyPI
        needs: check-dist
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-24.04
        environment: pypi
        permissions:
            id-token: write
        steps:
            - uses: actions/download-artifact@v5
              with:
                  path: dist
                  pattern: wheels-*
                  merge-multiple: true
            - uses: actions/download-artifact@v5
              with:
                  name: sdist
                  path: dist
            - uses: pypa/gh-action-pypi-publish@release/v1
